services:

  # ── Banco de Dados ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: workflow_postgres
    environment:
      POSTGRES_USER: workflow_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: workflow_studio
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5433}:5432"
    volumes:
      - workflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow_user -d workflow_studio"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Backend Django + uvicorn ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workflow_backend
    env_file: .env
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Frontend Next.js ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workflow_frontend
    env_file: .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: workflow_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Sync com Google Calendar (a cada hora) ────────────────────────────────
  calendar_sync:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workflow_calendar_sync
    command: >
      sh -c "
        echo 'calendar_sync iniciado — ciclo a cada 3600s';
        while true; do
          python scripts/calendar_sync.py;
          sleep 3600;
        done
      "
    env_file: .env
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Limpeza do Drive (a cada 30 minutos) ──────────────────────────────────
  drive_cleanup:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workflow_drive_cleanup
    command: >
      sh -c "
        echo 'drive_cleanup iniciado — ciclo a cada 1800s';
        while true; do
          python scripts/drive_cleanup.py;
          sleep 1800;
        done
      "
    env_file: .env
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Backup diário (a cada 24 horas) ───────────────────────────────────────
  backup:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workflow_backup
    command: >
      sh -c "
        echo 'backup iniciado — primeira execução em 60s, ciclo a cada 86400s';
        sleep 60;
        while true; do
          python scripts/backup.py;
          sleep 86400;
        done
      "
    env_file: .env
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: "5432"
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  workflow_postgres_data:
    name: ${DB_VOLUME:-workflow_postgres_data}

# Rate limiting: 100 req/min por IP
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ── HTTP — health-check, desafio ACME e redirect 301 para HTTPS ────────────────
server {
    listen 80;
    server_name _;

    # Health check do nginx (usado pelo Docker healthcheck) — fica em HTTP.
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Desafio do Certbot/Let's Encrypt (renovação de certificado sem derrubar o TLS).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # B5 — todo o restante vai para HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — TLS termina aqui; o backend recebe X-Forwarded-Proto=https ─────────
#
# Pré-requisito: certificado em ./nginx/certs/{fullchain.pem,privkey.pem}
# (montado em /etc/nginx/certs via docker-compose). Gerar com Certbot, ex.:
#   docker run --rm -v ./nginx/certs:/etc/letsencrypt ... certbot/certbot certonly ...
server {
    listen 443 ssl;
    http2 on;
    server_name _;  # ajuste para seu domínio (ex.: app.exemplo.com.br) se servir múltiplos hosts

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 500M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Arquivos estáticos do Django ──────────────────────────────────────────
    location /static/ {
        proxy_pass http://backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Admin Django ──────────────────────────────────────────────────────────
    location /admin/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ── API Django Ninja ──────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 500M;
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # ── Frontend Next.js ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
